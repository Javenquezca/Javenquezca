  <text x="20" y="248" class="mono b">  "focus"</text><text x="75" y="248" class="mono w">   :</text><text x="95" y="248" class="mono y"> ["Pentesting", "CTF Player", "Web Security"]</text><text x="420" y="248" class="mono w">,</text>
  <text x="20" y="266" class="mono b">  "stack"</text><text x="75" y="266" class="mono w">   :</text><text x="95" y="266" class="mono y"> ["React", "Next.js", "Node.js", "React Native"]</text><text x="435" y="266" class="mono w">,</text>
  <text x="20" y="284" class="mono b">  "tools"</text><text x="75" y="284" class="mono w">   :</text><text x="95" y="284" class="mono y"> ["Nmap", "Burp Suite", "Metasploit", "Wireshark"]</text><text x="444" y="284" class="mono w">,</text>
  <text x="20" y="302" class="mono b">  "os"</text><text x="57" y="302" class="mono w">      :</text><text x="77" y="302" class="mono p"> "Kali Linux / Parrot OS"</text><text x="257" y="302" class="mono w">,</text>
  <text x="20" y="320" class="mono b">  "status"</text><text x="82" y="320" class="mono w">  :</text><text x="102" y="320" class="mono g"> "Siempre aprendiendo..."</text>
  <text x="20" y="338" class="mono w">}</text>

