  <text x="52" y="772" class="mono w"> cat contact.txt</text>

  <text x="20" y="794" class="mono d">  Email    :</text><text x="98" y="794" class="mono b"> jastivenv@gmail.com</text>
  <text x="20" y="812" class="mono d">  GitHub   :</text><text x="98" y="812" class="mono b"> github.com/Javenquezca</text>
  <text x="20" y="830" class="mono d">  LinkedIn :</text><text x="98" y="830" class="mono b"> linkedin.com/in/javier-stiven-vasquez-claros</text>
