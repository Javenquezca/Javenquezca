  <text x="20" y="508" class="mono d">  stack  :</text><text x="94" y="508" class="mono w"> React · Express · PostgreSQL · JWT</text>
  <text x="20" y="526" class="mono d">  desc   :</text><text x="94" y="526" class="mono w"> Gestión de iglesias con roles y solicitudes.</text>

