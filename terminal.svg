<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 980" width="700" height="980">
  <defs>
    <style>
      .bg    { fill: #0d1117; }
      .bar   { fill: #161b22; }
      .sep   { stroke: #21262d; stroke-width: 1; }
      .mono  { font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; font-size: 13px; }
      .g     { fill: #3fb950; }
      .b     { fill: #58a6ff; }
      .y     { fill: #e3b341; }
      .r     { fill: #f85149; }
      .p     { fill: #bc8cff; }
      .d     { fill: #8b949e; }
      .w     { fill: #c9d1d9; }
      .dot-r { fill: #ff5f57; }
      .dot-y { fill: #febc2e; }
      .dot-g { fill: #28c840; }
      .cursor { fill: #3fb950; animation: blink 1s step-start infinite; }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="700" height="980" rx="12" class="bg"/>

