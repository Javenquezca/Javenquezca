  <text x="20" y="414" class="mono d">  status :</text><text x="94" y="414" class="mono y"> En Desarrollo</text>
  <text x="20" y="432" class="mono d">  stack  :</text><text x="94" y="432" class="mono w"> React Native · Node.js · MySQL</text>
  <text x="20" y="450" class="mono d">  desc   :</text><text x="94" y="450" class="mono w"> Plataforma moto-taxi con rastreo en tiempo real.</text>

