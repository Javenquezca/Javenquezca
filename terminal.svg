  <text x="20" y="566" class="mono d">  status :</text><text x="94" y="566" class="mono y"> Investigación</text>
  <text x="20" y="584" class="mono d">  stack  :</text><text x="94" y="584" class="mono w"> Python · TensorFlow · Computer Vision</text>

